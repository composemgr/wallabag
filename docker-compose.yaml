# nginx proxy address - http://172.17.0.1:8087

name: wallabag
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  wallabag:
    image: wallabag/wallabag:latest
    pull_policy: always
    container_name: wallabag-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - wallabag
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8087:80"
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: wallabag-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      SYMFONY__ENV__DATABASE_DRIVER: pdo_pgsql
      SYMFONY__ENV__DATABASE_HOST: wallabag-db
      SYMFONY__ENV__DATABASE_PORT: 5432
      SYMFONY__ENV__DATABASE_NAME: ${DB_CREATE_DATABASE_NAME:-wallabag}
      SYMFONY__ENV__DATABASE_USER: ${DB_USER_NAME:-wallabag}
      SYMFONY__ENV__DATABASE_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      SYMFONY__ENV__SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      SYMFONY__ENV__FOSUSER_REGISTRATION: false
      SYMFONY__ENV__FOSUSER_CONFIRMATION: false
      SYMFONY__ENV__MAILER_DSN: smtp://${EMAIL_SERVER_LOGIN_NAME:-}:${EMAIL_SERVER_LOGIN_PASS:-}@${EMAIL_SERVER_HOST:-172.17.0.1}:${EMAIL_SERVER_PORT:-587}
      SYMFONY__ENV__FROM_EMAIL: ${EMAIL_SERVER_MAIL_FROM:-noreply@example.com}
      SYMFONY__ENV__DOMAIN_NAME: http://${BASE_HOST_NAME:-$HOSTNAME}:8087
    volumes:
      - ./volumes/data/wallabag:/var/www/wallabag/data
      - ./volumes/data/wallabag/images:/var/www/wallabag/web/assets/images
    depends_on:
      wallabag-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://wallabag-app:80'
      - 'cloudflare.hostname=wallabag.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.wallabag-app.entrypoints=http'
      - 'traefik.http.routers.wallabag-app-secure.tls=true'
      - 'traefik.http.routers.wallabag-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.wallabag-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.wallabag-app.middlewares=wallabag-app-https-redirect'
      - 'traefik.http.routers.wallabag-app-secure.entrypoints=https'
      - 'traefik.http.routers.wallabag-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.wallabag-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.wallabag-app-secure.service=wallabag-app'
      - 'traefik.http.services.wallabag-app.loadbalancer.server.port=80'

  wallabag-db:
    image: postgres:latest
    pull_policy: always
    container_name: wallabag-db
    restart: always
    logging: *default-logging
    networks:
      - wallabag
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: wallabag-db
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-wallabag}
      POSTGRES_USER: ${DB_USER_NAME:-wallabag}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./volumes/data/db/postgres/wallabag:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  wallabag:
    name: wallabag
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
